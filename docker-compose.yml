version: "3.9"

services:
  api-tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-tests
    environment:
      PARALLEL: ${PARALLEL:-methods}
      THREAD_COUNT: ${THREAD_COUNT:-10}
    volumes:
      - ./build:/app/build
    command: ["gradle", "--no-daemon", "test", "allureReport"]